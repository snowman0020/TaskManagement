# Render Blueprint — deploys the FastAPI backend as a Docker web service.
# https://render.com/docs/blueprint-spec
#
# Create the service from this file: Render Dashboard → New → Blueprint → pick this repo.
# Then set the `sync: false` secrets in the service's Environment tab (see docs/DEPLOY.md).
services:
  - type: web
    name: taskflow-api
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: JWT_SECRET
        generateValue: true # Render generates a strong secret
      - key: MONGO_URI
        sync: false # set to your Atlas connection string
      - key: MONGO_DB
        value: taskmanagement
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false # set a strong password
      - key: CORS_ORIGINS
        sync: false # set to your Vercel URL, e.g. https://taskflow.vercel.app
